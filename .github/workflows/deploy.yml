name: Deploy para Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Garantir que o projeto Pages existe
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages project create chatspfc --production-branch=main
          # Se o projeto já existir, este passo falha normalmente, mas
          # isso não impede o próximo passo de rodar (continue-on-error).
        continue-on-error: true

      - name: Publicar no Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=chatspfc --commit-dirty=true
