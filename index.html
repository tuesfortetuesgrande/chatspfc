<script>
  // ============================================================
  // SERVICE WORKER INLINE (via Blob) - offline cache e instalação
  // ============================================================
  (function registerSW() {
    // Cria o código do service worker como string
    const swCode = `
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open('tricolor-chat-v1').then(cache => {
            return cache.addAll([
              '/',
              '/index.html'
            ]);
          })
        );
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(res => res || fetch(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(swUrl)
        .then(reg => console.log('✅ SW registrado:', reg))
        .catch(err => console.warn('⚠️ SW não registrado:', err));
    }
  })();
</script>

  function decodeBase64Utf8(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);

    return new TextDecoder("utf-8").decode(bytes);
  }

  function shareModal(){
    const url = location.href;
    const text = "Entre no Chat Tú és Forte, Tú és Grande e vem torcer com a gente!";
    const enc = encodeURIComponent;
    const options = [
      {key:"whatsapp", label:"WhatsApp", icon:"whatsapp", href:`https://wa.me/?text=${enc(text+" "+url)}`, bg:"#25D366"},
      {key:"facebook", label:"Facebook", icon:"facebook", href:`https://www.facebook.com/sharer/sharer.php?u=${enc(url)}`, bg:"#1877F2"},
      {key:"x", label:"X / Twitter", icon:"x", href:`https://twitter.com/intent/tweet?text=${enc(text)}&url=${enc(url)}`, bg:"#000000"},
      {key:"telegram", label:"Telegram", icon:"telegram", href:`https://t.me/share/url?url=${enc(url)}&text=${enc(text)}`, bg:"#26A5E4"},
      {key:"email", label:"E-mail", icon:"mail", href:`mailto:?subject=${enc("Chat Tú és Forte, Tú és Grande")}&body=${enc(text+" "+url)}`, bg:"#6b7280"},
    ];
    return `<div data-act="closeShare" class="absolute inset-0 z-40 bg-black/60 flex items-center justify-center p-4 anim-fade">
      <div data-stop class="w-full max-w-sm rounded-3xl bg-card p-6 shadow-2xl">

  /* ===================== CHAT ===================== */
  function chatView(){
    // O chat agora é o novo app MSN + Firebase, carregado isolado em um iframe.
    // Ele tem seu próprio login, avatares, reações e sistema de respostas — sem
    // interferir no restante do app (menu, temas, outras páginas, etc.).
    return `
    <div class="flex-1 overflow-hidden bg-card">
      <iframe id="msnChatFrame" title="Chat" class="w-full h-full border-0 block" allow="clipboard-write"></iframe>
    </div>`;
  }


  function messageBubble(m){
    const mine = m.nick === state.nick && m.avatar === state.avatar;
    const parent = m.replyTo ? state.messages.find(x=>x.id===m.replyTo) : null;
    
    // CORREÇÃO: Garante o fallback de m.reactions para evitar que m.reactions seja undefined
    const reactionEntries = Object.entries(m.reactions || {}).filter(([k, n]) => typeof n === 'number' && n > 0);
    const totalReactions = reactionEntries.reduce((acc, [, n]) => acc + n, 0);
    
    return `<div class="flex gap-2 ${mine?'justify-end':'justify-start'} mb-3">
      ${!mine?`<img src="${m.avatar}" class="h-8 w-8 rounded-full self-end mb-1 object-cover"/>`:""}
      <div class="relative max-w-[78%] flex flex-col ${mine?'items-end':'items-start'}">
        <div data-act="toggleMenu" data-id="${m.id}" class="relative rounded-2xl px-3 py-2 text-xs cursor-pointer select-none shadow-bubble"
             style="background:${mine?'var(--bubble-me)':'var(--bubble-other)'};color:${mine?'var(--bubble-me-fg)':'var(--bubble-other-fg)'};border-top-${mine?'right':'left'}-radius:4px">
          ${parent?`<div class="mb-1 rounded-lg px-2 py-1 text-[11px] border-l-2" style="border-color:${mine?'rgba(255,255,255,.7)':'var(--primary)'};background:${mine?'rgba(255,255,255,.15)':'var(--secondary)'};color:${mine?'rgba(255,255,255,.95)':'var(--bubble-other-fg)'}"><div class="font-semibold">${esc(parent.nick)}</div><div class="opacity-80 truncate">${esc(parent.text)}</div></div>`:""}
          ${!mine?`<div class="text-[10px] font-bold mb-0.5 text-primary">${esc(m.nick)}</div>`:""}
          <div class="whitespace-pre-wrap break-words leading-relaxed">${esc(m.text)}</div>
          <div class="text-[9px] mt-1 text-right ${mine?'opacity-75':'opacity-50'}">${m.edited?'<span class="mr-1 italic">editada</span>':''}${fmtTime(m.ts)}</div>

          ${state.openMenu===m.id?`
            <div data-stop class="absolute z-20 top-full mt-1 ${mine?'right-0':'left-0'} bg-popover text-popover-foreground rounded-xl shadow-xl border border-border py-1 text-[11px] min-w-[130px]">
              <button data-act="reply" data-id="${m.id}" class="w-full px-3 py-1.5 text-left hover:bg-secondary flex items-center gap-2 text-foreground">↩️ Responder</button>
              <button data-act="openReact" data-id="${m.id}" class="w-full px-3 py-1.5 text-left hover:bg-secondary flex items-center gap-2 text-foreground">😊 Reagir</button>
              ${mine?`
                <button data-act="edit" data-id="${m.id}" class="w-full px-3 py-1.5 text-left hover:bg-secondary flex items-center gap-2 text-foreground">✏️ Editar</button>
                <button data-act="del" data-id="${m.id}" class="w-full px-3 py-1.5 text-left hover:bg-secondary text-destructive flex items-center gap-2">🗑️ Excluir</button>`:""}
            </div>`:""}

          ${state.openReactions===m.id?`
            <div data-stop class="absolute z-30 -top-14 ${mine?'right-0':'left-0'} bg-popover rounded-full shadow-2xl border border-border px-3 py-1.5 flex gap-2.5 anim-fade items-center justify-between backdrop-blur-md bg-opacity-95">
              ${REACTIONS.map(r=>`
                <button data-act="react" data-id="${m.id}" data-k="${r.k}" title="${r.label}" class="transform hover:scale-125 transition-all duration-150 active:scale-95 w-7 h-7 shrink-0">
                  <img src="${r.img}" alt="${r.label}" class="w-full h-full object-contain" />
                </button>
              `).join("")}
            </div>`:""}
        </div>

        ${totalReactions > 0 ? `
          <div class="absolute -bottom-3 ${mine?'left-2':'right-2'} z-10 flex items-center bg-card border border-border rounded-full px-1.5 py-0.5 shadow-sm space-x-0.5 min-h-[20px]">
            <div class="flex -space-x-1 items-center">
              ${reactionEntries.map(([k])=>{
                const r=REACTIONS.find(x=>x.k===k);
                return r ? `<img src="${r.img}" class="w-3.5 h-3.5 object-contain rounded-full bg-card ring-1 ring-background" />` : '';
              }).join("")}
            </div>
            <span class="text-[9px] font-bold text-muted-foreground px-0.5">${totalReactions}</span>
          </div>`
        :""}
      </div>
      ${mine?`<img src="${m.avatar}" class="h-8 w-8 rounded-full self-end mb-1 object-cover"/>`:""}
    </div>`;
  }

          <center><span class="text-sm font-semibold text-green-500">● SporTV</span></center>
        <div class="relative w-full overflow-hidden rounded-2xl shadow-lg" style="padding-bottom:56.25%">
          <iframe src="https://embedcanaisdetv.xyz/e/index.php?canal=sportv" allow="autoplay;encrypted-media" allowfullscreen class="absolute inset-0 w-full h-full border-0"></iframe>
        </div>
        <div class="flex items-center justify-between mt-3">

        </div>
        <p class="text-xs text-muted-foreground mt-2">Quando aparecer o anúncio em pop-up na tela, clique em fechar.</p>
      `);
case "historia": 
  return section(`${ic("book","w-5 h-5 inline -mt-1")} História do São Paulo FC`, `
    <p>A mais jovem agremiação dentre os grandes do futebol brasileiro, o <strong>São Paulo Futebol Clube</strong> é o clube mais vencedor do Brasil!</p>
    
    <p>Fundado em 25 de janeiro de 1930 e marcado por histórias de superação, como a refundação do clube em 1935 ou os tempos difíceis da construção do <strong>MorumBIS</strong>, o Tricolor Mais Querido do planeta é o único clube brasileiro a ter conquistado a América e o Mundo por três vezes. É ainda o único Tricampeão consecutivo do Campeonato Brasileiro e o primeiro a conquistá-lo por seis vezes: Tri-Hexacampeão Brasileiro.</p>
    
    <p>Dentro das quatro linhas, foi vestindo o manto tricolor que o goleiro Caxambu inventou a ponte, que Roberto Dias tornou-se o maior marcador de Pelé, que Raí e Telê comemoraram a vitória sobre o Barcelona, que Müller marcou o gol que fez o italiano Costacurta perder o rumo de Milão, e que Rogério Ceni tornou-se o <strong>Maior Goleiro Artilheiro do Mundo</strong>.</p>
    
    <p>A grandeza do São Paulo transcende o futebol: foi defendendo suas cores que Adhemar Ferreira da Silva chegou ao ouro olímpico e que Éder Jofre, o Galo de Ouro, surgiu para o boxe mundial. Com um patrimônio invejável, incluindo o MorumBIS e centros de excelência em treinamento, o Tricolor faz jus ao seu hino: <em>dentre os grandes, és o primeiro!</em></p>
  `);
      case "titulos":{
        const grupos=[
          {c:"🌍 Mundiais",i:["Mundial de Clubes FIFA — 1992, 1993, 2005"]},
          {c:"🌎 Continentais",i:["Copa Libertadores — 1992, 1993, 2005","Copa Sul-Americana — 2012","Copa CONMEBOL — 1994","Recopa Sul-Americana — 1993, 1994","Supercopa Sul-Americana — 1993","Copa Master da Supercopa — 1996"]},
          {c:"🇧🇷 Nacionais",i:["Campeonato Brasileiro — 1977, 1986, 1991, 2006, 2007, 2008","Copa do Brasil — 2023","Supercopa do Brasil — 2024"]},
          {c:"🏟️ Estaduais",i:["Campeonato Paulista — 22 títulos (1931, 1943, 1945, 1946, 1948, 1949, 1953, 1957, 1970, 1971, 1975, 1980, 1981, 1985, 1987, 1989, 1991, 1992, 1998, 2000, 2005, 2021)"]},
        ];
        return section(`${ic("trophy","w-5 h-5 inline -mt-1")} Títulos`, grupos.map(g=>`
          <div class="rounded-xl border border-border bg-card p-4">
            <h3 class="font-semibold mb-2 text-foreground">${g.c}</h3>
            <ul class="list-disc pl-5 space-y-1 text-foreground">${g.i.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>
          </div>`).join(""));

            <span class="text-xs font-semibold bg-secondary rounded-full px-3 py-1 text-foreground">${esc(j.data)}</span>

      case "morumbi":
        return section(`${ic("mapPin","w-5 h-5 inline -mt-1")} Como chegar no Morumbi`,`
          <p>O <strong>Estádio do Morumbi</strong> fica na Av. Giovanni Gronchi, 1029 — Morumbi, São Paulo — SP, CEP 05656-001.</p>
          <div class="grid sm:grid-cols-2 gap-3">
            ${[
              ["🚇 Metrô + Ônibus","Estação Morumbi (Linha 9-Esmeralda) e siga de ônibus ou a pé (~25 min)."],

          <div class="rounded-2xl overflow-hidden shadow-lg border border-border">
            <iframe src="https://www.google.com/maps?q=Est%C3%A1dio+do+Morumbi&output=embed" class="w-full h-72 border-0" loading="lazy"></iframe>
          </div>`);
      case "quiz": return quizPage();
case "loja": {
        const produtos = [
          {
            nome: "Camisa Oficial I SPFC",
            preco: "R$ 349,90",
            img: "https://static.netshoes.com.br/produtos/camisa-sao-paulo-i-2425-sn-torcedor-new-balance-masculina/14/N24-0314-014/N24-0314-014_zoom1.jpg",

            link: "#"
          },
          {
            nome: "Bola Campo New Balance",

        ];

        return section(`${ic("bag","w-5 h-5 inline -mt-1")} Loja Oficial Morumbi`, `
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            ${produtos.map(p => `
              <div class="rounded-2xl border border-border bg-card p-3 flex flex-col justify-between items-center text-center overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-300">
                <div class="w-full aspect-square rounded-xl bg-muted overflow-hidden flex items-center justify-center mb-3">
                  <img src="${p.img}" alt="${esc(p.nome)}" class="object-cover w-full h-full hover:scale-105 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/150?text=SPFC'"/>

                <div class="flex-1 flex flex-col justify-between w-full">
                  <div>
                    <p class="text-xs sm:text-sm font-bold leading-tight text-foreground line-clamp-2 h-8 sm:h-10 mb-1">${esc(p.nome)}</p>

                  </div>
                  <a href="${p.link}" target="_blank" rel="noopener noreferrer" class="mt-2 w-full block text-center text-xs font-bold text-white rounded-xl py-2 gradient-hero hover:opacity-90 transition-opacity">

      case "contato":
        return section(`${ic("mail","w-5 h-5 inline -mt-1")} Contato`,`
          <p>Segue a gente nas redes e fica por dentro de tudo do Tricolor!</p>
          <div class="space-y-3">
            ${SOCIAL_CONFIG.filter(s=>state.social[s.key]).map(s=>{
              const val = state.social[s.key];
              return `<div class="rounded-2xl border border-border bg-card p-4 flex items-center gap-3">
                <span class="h-12 w-12 rounded-2xl flex items-center justify-center text-white shrink-0 gradient-hero">${ic(s.icon,"w-6 h-6")}</span>
                <a href="${socialHref(s.key,val)}" target="_blank" rel="noopener noreferrer" class="flex-1 min-w-0">
                  <p class="text-xs opacity-70 text-foreground">${s.label}</p>
                  <p class="font-semibold text-foreground truncate">${esc(val)}</p>
                </a>
              </div>`;
            }).join("") || `<p class="text-sm text-muted-foreground text-center">Nenhuma rede social configurada ainda.</p>`}
          </div>`);
      case "editar1":
      case "editar2":
        return section(`${ic("edit","w-5 h-5 inline -mt-1")} Editar — Página ${key==="editar1"?1:2}`,`
          <div class="rounded-2xl border-2 border-dashed border-border p-8 text-center">
            <p class="text-4xl mb-3">📝</p>
            <p class="font-semibold text-foreground">Página reservada para edição</p>
            <p class="text-xs text-muted-foreground mt-1">Edite o HTML para personalizar.</p>

    return "";
  }

  function quizPage(){
    const q=state.quiz;
    const titleHtml = `${ic("help","w-5 h-5 inline -mt-1")} Quiz SPFC`;
    if(q.done){
      return section(titleHtml,`
        <div class="rounded-2xl p-6 text-center text-white shadow-lg gradient-hero">
          <span class="inline-flex mb-2">${ic("trophy","w-12 h-12")}</span>
          <p class="text-2xl font-bold">Você acertou ${q.score} de ${QUIZ.length}</p>
          <p class="opacity-90 mt-1 text-sm">${q.score>=12?"Tricolor de coração! ❤️🤍🖤":q.score>=7?"Mandou bem! 👏":"Estude mais a história do clube! 📚"}</p>
        </div>
        <button data-act="quizReset" class="mt-4 w-full rounded-xl py-3 font-semibold text-primary-foreground gradient-hero">Jogar novamente</button>`);
    }
    const cur = QUIZ[q.idx];
    const answered = q.sel!==null;
    const isLast = q.idx+1>=QUIZ.length;
    return section(titleHtml,`
      <div class="flex items-center justify-between text-xs text-muted-foreground"><span>Pergunta ${q.idx+1}/${QUIZ.length}</span><span>Pontos: ${q.score}</span></div>
      <div class="h-2 rounded-full bg-secondary overflow-hidden"><div class="h-full gradient-hero" style="width:${(q.idx/QUIZ.length)*100}%"></div></div>
      <div class="rounded-2xl border border-border bg-card p-5">
        <p class="font-semibold mb-3 text-foreground">${esc(cur.q)}</p>
        <div class="grid gap-2">
          ${cur.o.map((opt,i)=>{
            const correct = q.sel!==null && i===cur.a;
            const wrong = q.sel===i && i!==cur.a;
            const cls = correct?'bg-green-500/20 border-green-500':wrong?'bg-red-500/20 border-red-500':'border-border hover:bg-secondary';
            return `<button data-act="quizAns" data-i="${i}" ${q.sel!==null?'disabled':''} class="text-left rounded-xl px-4 py-3 border transition ${cls} text-foreground">${esc(opt)}</button>`;
          }).join("")}
        </div>
      </div>
      <button data-act="quizNext" ${answered?'':'disabled'} class="w-full flex items-center justify-center gap-2 rounded-xl py-3 font-semibold text-primary-foreground gradient-hero transition disabled:opacity-40 disabled:cursor-not-allowed">
        ${isLast?'Ver resultado':'Próxima'} ${ic("arrowRight","w-4 h-4")}
      </button>`);
  }

  /* ===================== EVENTS ===================== */
  function bind(){
    const root = $("#app");
    if(!root) return;
    root.onclick = handleClick;
    
    const nick = $("#nickInput");
    if(nick) {
      nick.oninput = e => { 
        state.nick = e.target.value; 
        const b=$("#enterBtn"); 
        if(b){ if(state.nick.trim()) b.removeAttribute("disabled"); else b.setAttribute("disabled",""); } 
      };
    }
    
    const enter = $("#enterBtn"); 
    if(enter) {
      enter.onclick = () => { 
        if(state.nick.trim()) {
          const bloqueada = findBlockedWord(state.nick);
          if(bloqueada){
            alert("🚫 Esse apelido não é permitido neste chat. Escolha outro nome.");
            return;
          }
          setState({entered:true});
        }
      };
    }
    
    const mi = $("#msgInput");
    if(mi){
      mi.oninput = e => { state.input = e.target.value; };
      mi.onkeydown = e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } };
      mi.focus(); mi.selectionStart = mi.value.length;
    }
  }

  async function handleClick(e){
    const stop = e.target.closest("[data-stop]");
    const t = e.target.closest("[data-act]");
    if(!t) return;
    if(stop && !t.contains(stop) && !stop.contains(t)) return;
    const a = t.dataset.act;
    switch(a){
      case "toggleDark": state.dark=!state.dark; render(); break;
      case "pickAvatar": state.avatar = avatarUrl(t.dataset.seed); render(); break;
      case "openMenu": setState({menuOpen:true}); break;
      case "closeMenu": if(e.target===t||!e.target.closest("[data-stop]")) setState({menuOpen:false}); break;
      case "setPage": setState({page:t.dataset.key, menuOpen:false, openMenu:null, openReactions:null}); break;
      case "openAvatarPicker": setState({showAvatarPicker:true}); break;
      case "closeAvatarPicker": if(!e.target.closest("[data-stop]")||e.target===t) setState({showAvatarPicker:false}); break;
      case "setAvatar": state.avatar = avatarUrl(t.dataset.seed); setState({showAvatarPicker:false}); break;
      case "openThemes": setState({showThemes:true}); break;
      case "closeThemes": if(!e.target.closest("[data-stop]")||e.target===t) setState({showThemes:false}); break;
      case "pickTheme": state.themeIdx=+t.dataset.i; setState({showThemes:false}); break;
      case "share": shareApp(); break;
      case "openShare": setState({showShare:true}); break;
      case "closeShare": if(!e.target.closest("[data-stop]")||e.target===t) setState({showShare:false}); break;
      case "shareCopy": {
        try{
          await navigator.clipboard.writeText(location.href);
          state.shareMsg="Link copiado!"; render();
          setTimeout(()=>{state.shareMsg=""; render();},2000);
        }catch{}
        break;
      }
      case "shareNative": {
        try{ await navigator.share({title:"Chat Tú és Forte, Tú és Grande",text:"Entre no Chat Tú és Forte, Tú és Grande e vem torcer com a gente!",url:location.href}); }catch{}
        break;
      }
      case "logout": Object.assign(state,{entered:false,messages:[],input:"",editingId:null,replyId:null,page:"chat",menuOpen:false}); render(); break;
      case "send": send(); break;
      case "cancelReplyEdit": state.replyId=null; if(state.editingId){state.editingId=null; state.input="";} render(); break;
      case "toggleMenu": e.stopPropagation(); setState({openMenu: state.openMenu===t.dataset.id?null:t.dataset.id, openReactions:null}); break;
      case "reply": setState({replyId:t.dataset.id, openMenu:null}); break;
      case "openReact": setState({openReactions:t.dataset.id, openMenu:null}); break;
      case "edit": { const m=state.messages.find(x=>x.id===t.dataset.id); if(m){state.editingId=m.id; state.input=m.text; state.replyId=null; state.openMenu=null; render();} break; }
      case "del": 
        await deleteDoc(doc(db, "mensagens", t.dataset.id));
        if(state.editingId===t.dataset.id){state.editingId=null;state.input="";} 
        state.openMenu=null; 
        break;
      case "react": { 
        const id=t.dataset.id, k=t.dataset.k; 
        const m=state.messages.find(x=>x.id===id);
        if(m){
          const currentReactions = m.reactions || {};
          await updateDoc(doc(db, "mensagens", id), {
            [`reactions.${k}`]: (currentReactions[k] || 0) + 1
          });
        }
        state.openReactions=null; 
        break; 
      }
      case "closeOverlays": if(state.openMenu||state.openReactions) setState({openMenu:null,openReactions:null}); break;
      case "quizAns": { if(state.quiz.sel!==null) return; const i=+t.dataset.i; const cur=QUIZ[state.quiz.idx]; state.quiz.sel=i; if(i===cur.a) state.quiz.score++; render(); break; }
      case "quizNext": {
        if(state.quiz.sel===null) return;
        if(state.quiz.idx+1>=QUIZ.length) state.quiz.done=true;
        else { state.quiz.idx++; state.quiz.sel=null; }
        render();
        break;
      }
      case "quizReset": state.quiz={idx:0,score:0,sel:null,done:false}; render(); break;
    }
  }

  async function send(){
    const text = (state.input||"").trim();
    if(!text) return;

    const bloqueada = findBlockedWord(text);
    if(bloqueada){
      alert("🚫 Sua mensagem não pode ser enviada porque contém uma palavra bloqueada neste chat.");
      return;
    }
    
    if(state.editingId){
      await updateDoc(doc(db, "mensagens", state.editingId), {
        text,
        edited: true
      });
      state.editingId=null;
    } else {
      await addDoc(collection(db, "mensagens"), {
        author: "me",
        nick: state.nick,
        avatar: state.avatar,
        text,
        ts: Date.now(),
        reactions: {},
        replyTo: state.replyId || null
      });
      state.replyId=null;

      setTimeout(async ()=>{
        await addDoc(collection(db, "mensagens"), {
          author: "bot",
          nick: BOT.nick,
          avatar: BOT.avatar,
          text: BOT_REPLIES[Math.floor(Math.random()*BOT_REPLIES.length)],
          ts: Date.now(),
          reactions: {}
        });
      }, 900+Math.random()*800);
    }
    state.input="";
    render();
  }

  async function shareApp(){
    const url = location.href;
    const data = {title:"ChatVibe",text:"Entre no ChatVibe e converse comigo!",url};
    try{
      if(navigator.share) await navigator.share(data);
      else { await navigator.clipboard.writeText(url); state.shareMsg="Link copiado!"; render(); setTimeout(()=>{state.shareMsg=""; render();},2000); }
    }catch{}
  }

  setInterval(() => {
    if (!state.entered) return;
    let n = Math.floor(Math.random() * ADS.length);
    if (n === state.adIndex) n = (n + 1) % ADS.length;
    state.adIndex = n;
    updateAdOnly();
  }, 7000);

  // Executa o primeiro render logo de cara para abrir a tela de login
  render();
</script>
