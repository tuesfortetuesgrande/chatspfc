<script>
  // ============================================================
  // SERVICE WORKER INLINE (via Blob) - offline cache e instalação
  // ============================================================
  (function registerSW() {
    // Cria o código do service worker como string
    const swCode = `
      self.addEventListener('install', e => {
        e.waitUntil(
          caches.open('tricolor-chat-v1').then(cache => {
            return cache.addAll([
              '/',
              '/index.html'
            ]);
          })
        );
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(res => res || fetch(e.request))
        );
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(swUrl)
        .then(reg => console.log('✅ SW registrado:', reg))
        .catch(err => console.warn('⚠️ SW não registrado:', err));
    }
  })();
</script>

  // Decodifica o base64 preservando corretamente acentos/emojis (UTF-8) e guarda o HTML
  // completo do chat como texto puro. Esse texto é atribuído diretamente à propriedade
  // .srcdoc do iframe via JavaScript (não como atributo HTML) em render(), o que faz o
  // iframe herdar a MESMA origem da página principal — por isso localStorage e a
  // persistência do Firebase Auth funcionam normalmente lá dentro. (Com "data:" URI ou
  // Blob URL, alguns navegadores tratam o iframe como origem "opaca"/bloqueada, o que
  // quebrava o React silenciosamente e deixava a tela em branco.)
  function decodeBase64Utf8(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder("utf-8").decode(bytes);
  }

  function applyTheme(){
    const t = THEMES[state.themeIdx];
    Object.entries(t.vars).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
  }
  function applyDark(){ document.documentElement.classList.toggle("dark", state.dark); }

  function setState(patch){ Object.assign(state, patch); render(); }

  // ESCUTANDO MENSAGENS EM TEMPO REAL DO FIRESTORE
  const qMessages = query(collection(db, "mensagens"), orderBy("ts", "asc"));
  onSnapshot(qMessages, (snapshot) => {
    const msgs = [];
    snapshot.forEach((doc) => {
      msgs.push({ id: doc.id, ...doc.data() });
    });
    state.messages = msgs;
    render();
  });

  /* ===================== RENDER ===================== */
  function render(){
    applyDark(); applyTheme();
    $("#app").innerHTML = state.entered ? appView() : loginView();
    bind();
    if(state.entered && state.page==="chat"){
      const sc = $("#scrollArea"); if(sc) sc.scrollTop = sc.scrollHeight;
      const frame = $("#msnChatFrame");
      if (frame && !frame.dataset.loaded) {
        frame.srcdoc = MSN_CHAT_HTML;
        frame.dataset.loaded = "1";
      }
    }
    updateAdOnly();
  }

function updateAdOnly() {
  const adContainer = document.getElementById("ad-container");
  if (!adContainer) return;
  const ad = ADS[state.adIndex];
  
  adContainer.innerHTML = `

      <div class="relative rounded-lg text-white shadow-sm overflow-hidden flex items-center p-2 gap-3" style="background:${ad.gradient}">
        
        <div class="text-2xl shrink-0">${ad.icon}</div>
        
        <div class="flex-1 min-w-0">

          <p class="text-sm font-bold truncate">${esc(ad.title)}</p>

        <button class="text-[10px] font-bold bg-white/20 backdrop-blur-sm border border-white/30 rounded px-3 py-1 shrink-0 hover:bg-white/30 transition">
          ${esc(ad.cta)}

  `;
}

  function shareModal(){
    const url = location.href;
    const text = "Entre no Chat Tú és Forte, Tú és Grande e vem torcer com a gente!";
    const enc = encodeURIComponent;
    const options = [
      {key:"whatsapp", label:"WhatsApp", icon:"whatsapp", href:`https://wa.me/?text=${enc(text+" "+url)}`, bg:"#25D366"},
      {key:"facebook", label:"Facebook", icon:"facebook", href:`https://www.facebook.com/sharer/sharer.php?u=${enc(url)}`, bg:"#1877F2"},
      {key:"x", label:"X / Twitter", icon:"x", href:`https://twitter.com/intent/tweet?text=${enc(text)}&url=${enc(url)}`, bg:"#000000"},
      {key:"telegram", label:"Telegram", icon:"telegram", href:`https://t.me/share/url?url=${enc(url)}&text=${enc(text)}`, bg:"#26A5E4"},
      {key:"email", label:"E-mail", icon:"mail", href:`mailto:?subject=${enc("Chat Tú és Forte, Tú és Grande")}&body=${enc(text+" "+url)}`, bg:"#6b7280"},
    ];
    return `<div data-act="closeShare" class="absolute inset-0 z-40 bg-black/60 flex items-center justify-center p-4 anim-fade">

  /* ===================== CHAT ===================== */
  function chatView(){
    // O chat agora é o novo app MSN + Firebase, carregado isolado em um iframe.
    // Ele tem seu próprio login, avatares, reações e sistema de respostas — sem
    // interferir no restante do app (menu, temas, outras páginas, etc.).
    return `
    <div class="flex-1 overflow-hidden bg-card">
      <iframe id="msnChatFrame" title="Chat" class="w-full h-full border-0 block" allow="clipboard-write"></iframe>
    </div>`;
  }


  function messageBubble(m){
    const mine = m.nick === state.nick && m.avatar === state.avatar;
    const parent = m.replyTo ? state.messages.find(x=>x.id===m.replyTo) : null;
    
    // CORREÇÃO: Garante o fallback de m.reactions para evitar que m.reactions seja undefined
    const reactionEntries = Object.entries(m.reactions || {}).filter(([k, n]) => typeof n === 'number' && n > 0);
    const totalReactions = reactionEntries.reduce((acc, [, n]) => acc + n, 0);
    
    return `<div class="flex gap-2 ${mine?'justify-end':'justify-start'} mb-3">
      ${!mine?`<img src="${m.avatar}" class="h-8 w-8 rounded-full self-end mb-1 object-cover"/>`:""}
      <div class="relative max-w-[78%] flex flex-col ${mine?'items-end':'items-start'}">
        <div data-act="toggleMenu" data-id="${m.id}" class="relative rounded-2xl px-3 py-2 text-xs cursor-pointer select-none shadow-bubble"
             style="background:${mine?'var(--bubble-me)':'var(--bubble-other)'};color:${mine?'var(--bubble-me-fg)':'var(--bubble-other-fg)'};border-top-${mine?'right':'left'}-radius:4px">
          ${parent?`<div class="mb-1 rounded-lg px-2 py-1 text-[11px] border-l-2" style="border-color:${mine?'rgba(255,255,255,.7)':'var(--primary)'};background:${mine?'rgba(255,255,255,.15)':'var(--secondary)'};color:${mine?'rgba(255,255,255,.95)':'var(--bubble-other-fg)'}"><div class="font-semibold">${esc(parent.nick)}</div><div class="opacity-80 truncate">${esc(parent.text)}</div></div>`:""}
          ${!mine?`<div class="text-[10px] font-bold mb-0.5 text-primary">${esc(m.nick)}</div>`:""}
          <div class="whitespace-pre-wrap break-words leading-relaxed">${esc(m.text)}</div>
          <div class="text-[9px] mt-1 text-right ${mine?'opacity-75':'opacity-50'}">${m.edited?'<span class="mr-1 italic">editada</span>':''}${fmtTime(m.ts)}</div>

  /* ===================== EVENTS ===================== */
  function bind(){
    const root = $("#app");
    if(!root) return;
    root.onclick = handleClick;
    
    const nick = $("#nickInput");
    if(nick) {
      nick.oninput = e => { 
        state.nick = e.target.value; 
        const b=$("#enterBtn"); 
        if(b){ if(state.nick.trim()) b.removeAttribute("disabled"); else b.setAttribute("disabled",""); } 
      };
    }
    
    const enter = $("#enterBtn"); 
    if(enter) {
      enter.onclick = () => { 
        if(state.nick.trim()) {
          const bloqueada = findBlockedWord(state.nick);
          if(bloqueada){
            alert("🚫 Esse apelido não é permitido neste chat. Escolha outro nome.");
            return;
          }
          setState({entered:true});
        }
      };
    }
    
    const mi = $("#msgInput");
    if(mi){
      mi.oninput = e => { state.input = e.target.value; };
      mi.onkeydown = e => { if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } };
      mi.focus(); mi.selectionStart = mi.value.length;
    }
  }

  async function handleClick(e){
    const stop = e.target.closest("[data-stop]");
    const t = e.target.closest("[data-act]");
    if(!t) return;
    if(stop && !t.contains(stop) && !stop.contains(t)) return;
    const a = t.dataset.act;
    switch(a){
      case "toggleDark": state.dark=!state.dark; render(); break;
      case "pickAvatar": state.avatar = avatarUrl(t.dataset.seed); render(); break;
      case "openMenu": setState({menuOpen:true}); break;
      case "closeMenu": if(e.target===t||!e.target.closest("[data-stop]")) setState({menuOpen:false}); break;
      case "setPage": setState({page:t.dataset.key, menuOpen:false, openMenu:null, openReactions:null}); break;
      case "openAvatarPicker": setState({showAvatarPicker:true}); break;
      case "closeAvatarPicker": if(!e.target.closest("[data-stop]")||e.target===t) setState({showAvatarPicker:false}); break;
      case "setAvatar": state.avatar = avatarUrl(t.dataset.seed); setState({showAvatarPicker:false}); break;
      case "openThemes": setState({showThemes:true}); break;
      case "closeThemes": if(!e.target.closest("[data-stop]")||e.target===t) setState({showThemes:false}); break;
      case "pickTheme": state.themeIdx=+t.dataset.i; setState({showThemes:false}); break;
      case "share": shareApp(); break;
      case "openShare": setState({showShare:true}); break;
      case "closeShare": if(!e.target.closest("[data-stop]")||e.target===t) setState({showShare:false}); break;
      case "shareCopy": {
        try{
          await navigator.clipboard.writeText(location.href);
          state.shareMsg="Link copiado!"; render();
          setTimeout(()=>{state.shareMsg=""; render();},2000);
        }catch{}
        break;
      }
      case "shareNative": {
        try{ await navigator.share({title:"Chat Tú és Forte, Tú és Grande",text:"Entre no Chat Tú és Forte, Tú és Grande e vem torcer com a gente!",url:location.href}); }catch{}
        break;
      }
      case "logout": Object.assign(state,{entered:false,messages:[],input:"",editingId:null,replyId:null,page:"chat",menuOpen:false}); render(); break;
      case "send": send(); break;
      case "cancelReplyEdit": state.replyId=null; if(state.editingId){state.editingId=null; state.input="";} render(); break;
      case "toggleMenu": e.stopPropagation(); setState({openMenu: state.openMenu===t.dataset.id?null:t.dataset.id, openReactions:null}); break;
      case "reply": setState({replyId:t.dataset.id, openMenu:null}); break;
      case "openReact": setState({openReactions:t.dataset.id, openMenu:null}); break;
      case "edit": { const m=state.messages.find(x=>x.id===t.dataset.id); if(m){state.editingId=m.id; state.input=m.text; state.replyId=null; state.openMenu=null; render();} break; }
      case "del": 
        await deleteDoc(doc(db, "mensagens", t.dataset.id));
        if(state.editingId===t.dataset.id){state.editingId=null;state.input="";} 
        state.openMenu=null; 
        break;
      case "react": { 
        const id=t.dataset.id, k=t.dataset.k; 
        const m=state.messages.find(x=>x.id===id);
        if(m){
          const currentReactions = m.reactions || {};
          await updateDoc(doc(db, "mensagens", id), {
            [`reactions.${k}`]: (currentReactions[k] || 0) + 1
          });
        }
        state.openReactions=null; 
        break; 
      }
      case "closeOverlays": if(state.openMenu||state.openReactions) setState({openMenu:null,openReactions:null}); break;
      case "quizAns": { if(state.quiz.sel!==null) return; const i=+t.dataset.i; const cur=QUIZ[state.quiz.idx]; state.quiz.sel=i; if(i===cur.a) state.quiz.score++; render(); break; }
      case "quizNext": {
        if(state.quiz.sel===null) return;
        if(state.quiz.idx+1>=QUIZ.length) state.quiz.done=true;
        else { state.quiz.idx++; state.quiz.sel=null; }
        render();
        break;
      }
      case "quizReset": state.quiz={idx:0,score:0,sel:null,done:false}; render(); break;
    }
  }

  async function send(){
    const text = (state.input||"").trim();
    if(!text) return;

    const bloqueada = findBlockedWord(text);
    if(bloqueada){
      alert("🚫 Sua mensagem não pode ser enviada porque contém uma palavra bloqueada neste chat.");
      return;
    }
    
    if(state.editingId){
      await updateDoc(doc(db, "mensagens", state.editingId), {
        text,
        edited: true
      });
      state.editingId=null;
    } else {
      await addDoc(collection(db, "mensagens"), {
        author: "me",
        nick: state.nick,
        avatar: state.avatar,
        text,
        ts: Date.now(),
        reactions: {},
        replyTo: state.replyId || null
      });
      state.replyId=null;

      setTimeout(async ()=>{
        await addDoc(collection(db, "mensagens"), {
          author: "bot",
          nick: BOT.nick,
          avatar: BOT.avatar,
          text: BOT_REPLIES[Math.floor(Math.random()*BOT_REPLIES.length)],
          ts: Date.now(),
          reactions: {}
        });
      }, 900+Math.random()*800);
    }
    state.input="";
    render();
  }

  async function shareApp(){
    const url = location.href;
    const data = {title:"ChatVibe",text:"Entre no ChatVibe e converse comigo!",url};
    try{
      if(navigator.share) await navigator.share(data);
      else { await navigator.clipboard.writeText(url); state.shareMsg="Link copiado!"; render(); setTimeout(()=>{state.shareMsg=""; render();},2000); }
    }catch{}
  }

  setInterval(() => {
    if (!state.entered) return;
    let n = Math.floor(Math.random() * ADS.length);
    if (n === state.adIndex) n = (n + 1) % ADS.length;
    state.adIndex = n;
    updateAdOnly();
  }, 7000);

  // Executa o primeiro render logo de cara para abrir a tela de login
  render();
</script>
</body>
</html>
